name: Update Price History

on:
  schedule:
    - cron: '0 18 * * *'  # Daily at 18:00 UTC (20:00 Prague, 19:00 CET / 20:00 CEST)
  workflow_dispatch: {}   # Manual trigger
  push:
    branches: [main]
    paths: [scripts/build-history.js]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build price history
        run: node scripts/build-history.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/history-last-valid.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "data: update price history [$(date -u +%Y-%m-%d)]"
          git push
