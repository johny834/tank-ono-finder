<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Tank ONO Finder – Čerpací stanice</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="logo">
        <svg id="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 22V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          <path d="M3 22h12M3 11h12" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          <path d="M17 8h1a2 2 0 0 1 2 2v6a2 2 0 0 0 2 2" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          <circle cx="20" cy="18" r="1" fill="#f59e0b"/>
          <rect x="6" y="14" width="6" height="4" rx="1" fill="#f59e0b" opacity="0.4"/>
        </svg>
        <span class="logo-brand">TANK <strong>ONO</strong></span>
        <span class="logo-divider"></span>
        <span class="logo-sub">Finder</span>
      </div>
      <div id="header-right">
        <div id="price-status-wrap">
          <span id="price-dot" class="status-dot loading"></span>
          <span id="price-status">Načítání cen…</span>
        </div>
        <button id="refresh-btn" class="icon-btn" title="Obnovit ceny" onclick="fetchPrices()">
          <svg id="refresh-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="main">

      <aside id="sidebar">
        <div id="selected-section">
          <div id="selected-placeholder">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#5a5f7d" stroke-width="1.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <p>Vyberte stanici na&nbsp;mapě<br>nebo ze&nbsp;seznamu níže</p>
          </div>

          <div id="selected-info" class="hidden">
            <div id="selected-header">
              <button id="selected-close" onclick="clearSelection()" title="Zavřít">✕</button>
              <div id="selected-name"></div>
              <div id="selected-chips">
                <span id="selected-distance" class="chip dist-chip"></span>
                <span id="nearest-badge" class="chip nearest-chip hidden">⭐ Nejbližší</span>
              </div>
            </div>
            <div id="prices-panel">
              <div class="prices-loading">
                <span class="spinner"></span> Načítání cen…
              </div>
            </div>
          </div>
        </div>

        <div id="list-header">
          <span class="list-title">Všechny stanice</span>
          <span id="list-meta" class="list-meta"></span>
        </div>
        <div id="station-list"></div>
      </aside>

      <div id="map-wrap">
        <div id="map"></div>

        <button id="locate-btn" class="map-fab" title="Moje poloha" onclick="triggerGeolocation()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
        </button>

        <div id="geo-notice" class="hidden">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          </svg>
          Poloha nedostupná
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPeE=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
