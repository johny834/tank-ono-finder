<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tank ONO – Najdi stanici</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Map (full bleed) -->
  <div id="map"></div>

  <!-- Top bar -->
  <header id="topbar">
    <div id="brand">
      <span class="brand-name">TANK <strong>ONO</strong></span>
      <span class="brand-sep"></span>
      <span class="brand-sub">Finder</span>
    </div>
    <div id="topbar-right">
      <div id="price-badge">
        <span id="price-dot"></span>
        <span id="price-status">Načítání…</span>
      </div>
      <button class="tb-btn" id="history-btn" title="Historie cen" onclick="openHistory()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </button>
      <button class="tb-btn" id="refresh-btn" title="Obnovit ceny" onclick="fetchPrices()">
        <svg id="refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="tb-btn" id="theme-btn" title="Přepnout motiv" onclick="toggleTheme()">
        <svg id="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Side panel (desktop) -->
  <div id="panel">
    <!-- Station detail card (shown when station selected) -->
    <div id="detail" class="hidden">
      <div id="detail-head">
        <div>
          <div id="detail-name"></div>
          <div id="detail-chips"></div>
        </div>
        <button id="detail-close" onclick="clearSelection()" title="Zavřít">&times;</button>
      </div>
      <div id="detail-prices"></div>
      <div id="detail-actions">
        <button id="detail-nav-btn" onclick="navigateToStation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Navigovat
        </button>
        <button id="detail-history-btn" onclick="openHistory()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Historie
        </button>
      </div>
    </div>

    <!-- Station list -->
    <div id="list-section">
      <div id="list-header">
        <span id="list-title">Stanice</span>
        <span id="list-meta"></span>
      </div>
      <div id="station-list"></div>
    </div>
  </div>

  <!-- Bottom sheet (mobile) -->
  <div id="sheet" class="hidden">
    <div id="sheet-handle" onclick="toggleSheet()"><div class="handle-bar"></div></div>
    <div id="sheet-content">
      <div id="sheet-head">
        <div>
          <div id="sheet-name"></div>
          <div id="sheet-chips"></div>
        </div>
        <button id="sheet-close" onclick="clearSelection()">&times;</button>
      </div>
      <div id="sheet-prices"></div>
      <div id="sheet-actions">
        <button onclick="navigateToStation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Navigovat
        </button>
        <button onclick="openHistory()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Historie
        </button>
      </div>
    </div>
  </div>

  <!-- Map controls -->
  <button id="locate-btn" title="Moje poloha" onclick="triggerGeolocation()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
  </button>

  <div id="geo-notice" class="hidden">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
    Poloha nedostupná
  </div>

  <!-- History modal -->
  <div id="history-overlay" class="hidden" onclick="closeHistory(event)">
    <div id="history-modal">
      <div id="history-head">
        <span>Historie cen</span>
        <button onclick="closeHistory()">&times;</button>
      </div>
      <div id="history-tabs">
        <button class="htab active" data-range="week" onclick="switchHistoryTab('week')">Týden</button>
        <button class="htab" data-range="month" onclick="switchHistoryTab('month')">Měsíc</button>
        <button class="htab" data-range="half" onclick="switchHistoryTab('half')">Půl roku</button>
      </div>
      <div id="history-summary"></div>
      <div id="chart-wrap"><canvas id="history-chart"></canvas></div>
      <div id="history-status"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
